services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-whitelist_system}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      ConnectionStrings__WhitelistDb: >-
        Host=db;Port=5432;Database=${DB_NAME:-whitelist_system};
        Username=${DB_USER:-postgres};Password=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
